<!DOCTYPE html>
<html lang="es" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo jugador</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container">
        <h2 class="mb-4">Registrar jugador</h2>
        <form th:action="@{/players}" th:object="${player}" method="post">
            <div class="mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">País:</label>
                <input type="text" class="form-control" th:field="*{country}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Ránking:</label>
                <input type="number" class="form-control" th:field="*{ranking}" required>
            </div>

            <button type="submit" class="btn btn-primary">Guardar jugador</button>
            <a href="/players" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
