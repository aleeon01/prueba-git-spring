<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Manager</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container mt-5">
        <h1>Tennis Manager</h1>
        <p>Proyecto de práctica con Spring Boot, Thymeleaf, Hibernate y Git.</p>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="home-card text-center">
                    <h4>Crear Jugador</h4>
                    <p>Registro de todos los jugadores inscritos en el ránking.</p>
                    <a href="/players/new" class="btn btn-primary home-btn">Crear Jugador</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="home-card text-center">
                    <h4>Lista de Jugadores</h4>
                    <p>Ver todos los jugadores existentes en el ránking.</p>
                    <a href="/players" class="btn btn-success home-btn">Ver jugadores</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
